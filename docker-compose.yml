version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: financepro_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - finance-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./financepro/backend
      dockerfile: Dockerfile
    container_name: financepro_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/personal_finance_db}
      - JWT_SECRET=${JWT_SECRET:-finance_pro_secret_key_2026}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-finance_pro_refresh_key_2026}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
      - SERVER_URL=${SERVER_URL:-http://localhost:5000}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - finance-network

  frontend:
    build:
      context: ./financepro/frontend
      dockerfile: Dockerfile
    container_name: financepro_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - finance-network

volumes:
  mongodb_data:
    driver: local

networks:
  finance-network:
    driver: bridge
